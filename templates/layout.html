<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Proxy Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <header class="mb-8 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div>
            <p class="text-sm text-slate-500">LLM API Gateway / Proxy</p>
            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Admin Console</h1>
          </div>
          <nav class="flex flex-wrap gap-3 text-sm font-medium">
            <a href="/admin/keys" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">API Keys</a>
            <a href="/admin/logs" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Logs</a>
            <a href="/admin/providers" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Providers</a>
            <a href="/admin/groups" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Groups</a>
            <a href="/admin/playground" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Playground</a>
            <a href="/admin/config" class="rounded-full bg-slate-900 px-4 py-2 text-white hover:bg-slate-700">Config Editor</a>
          </nav>
        </div>
      </header>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
