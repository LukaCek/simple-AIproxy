services:
  llm-proxy:
    # Replace YOUR_GITHUB_USERNAME with your actual GitHub username
    image: ghcr.io/YOUR_GITHUB_USERNAME/simple-aiproxy:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.yml:/app/config.yml:rw
      - ./app.db:/app/app.db:rw
    mem_limit: 512m
