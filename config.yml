# Example config. Client-facing model names are groups under `groups`.
# Put real secrets in server-side env or a deployment-only config.yml, not git.
providers:
  - name: codex-a
    url: https://chatgpt.com/backend-api/codex
    description: First OpenAI Codex OAuth profile; paste/import tokens on the server
    models:
      - gpt-5.5
    api_mode: codex_responses
    oauth: true
    client_id: app_EMoamEEZ73f0CkXaXp7hrann
    token_url: https://auth.openai.com/oauth/token
    access_token: ""
    refresh_token: ""
    expires_at: ""

  - name: codex-b
    url: https://chatgpt.com/backend-api/codex
    description: Second OpenAI Codex OAuth profile; used evenly by round-robin
    models:
      - gpt-5.5
    api_mode: codex_responses
    oauth: true
    client_id: app_EMoamEEZ73f0CkXaXp7hrann
    token_url: https://auth.openai.com/oauth/token
    access_token: ""
    refresh_token: ""
    expires_at: ""

  # OpenAI-compatible example, including Ollama (base host is normalized to /v1/chat/completions)
  - name: ollama-local
    url: http://localhost:11434
    description: Ollama OpenAI-compatible endpoint
    models:
      - llama3.2
    api_key: ""
    api_mode: openai_chat_completions

model_profiles:
  slowbrain-70b:
    type: llamacpp_rpc
    worker_type: llamacpp_rpc_worker
    endpoint: http://llama-main:8080/v1
    health_url: http://llama-main:8080/health
    model: llama-3.3-70b-q2
    timeout_seconds: 21600
    max_parallel_jobs: 1
    max_attempts: 2
    retry_delay_seconds: 60

  # Sidecar worker profiles enqueue durable jobs but require an external worker
  # process to lease and complete them.
  slowbrain-airllm:
    type: airllm_offload
    worker_type: airllm_offload_worker
    command: python -m workers.airllm_sidecar --model /models/llama-70b --job-id {job_id}
    timeout_seconds: 21600
    max_parallel_jobs: 1

  slowbrain-accelerate:
    type: accelerate_offload
    worker_type: accelerate_offload_worker
    command: accelerate launch workers/accelerate_sidecar.py --model /models/llama-70b --job-id {job_id}
    timeout_seconds: 21600
    max_parallel_jobs: 1

groups:
  gpt-5.5:
    description: Balanced Codex profile pool
    strategy: round_robin
    members:
      - provider: codex-a
        model: gpt-5.5
      - provider: codex-b
        model: gpt-5.5

  local-llama:
    description: Local Ollama model
    strategy: fallback
    members:
      - provider: ollama-local
        model: llama3.2
